version: "3.9"

services:
  questdb:
    image: questdb/questdb:7.4.0
    container_name: alpha-questdb
    ports:
      - "9000:9000"   # Web Console
      - "8812:8812"   # PostgreSQL wire protocol
      - "9009:9009"   # InfluxDB line protocol
    volumes:
      - questdb-data:/var/lib/questdb
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/exec?query=SELECT+1"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  alpha-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alpha-server
    depends_on:
      questdb:
        condition: service_healthy
    environment:
      DB_HOST: questdb
      DB_PORT: "8812"
      DB_NAME: qdb
      DB_USER: admin
      DB_PASSWORD: ${DB_PASSWORD:-quest}
      ALPHA_JWT_SECRET: ${ALPHA_JWT_SECRET:-}
      ALPHA_DEFAULT_ADMIN_PASSWORD: ${ALPHA_DEFAULT_ADMIN_PASSWORD:-}
      ALPHA_BROKER: ${ALPHA_BROKER:-mock}
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET:-}
    ports:
      - "8000:8000"
    volumes:
      - alpha-models:/root/AlphaModels
    restart: unless-stopped

volumes:
  questdb-data:
  alpha-models:
