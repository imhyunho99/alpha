name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ---------- Windows .exe 빌드 ----------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.docker.txt
          pip install pyinstaller PySide6

      - name: Build AlphaServer.exe
        run: pyinstaller --noconfirm AlphaServer.spec

      - name: Build AlphaClient.exe
        run: pyinstaller --noconfirm AlphaClient.spec

      - name: Stage Windows artifacts
        shell: pwsh
        # AlphaServer는 AlphaClient.spec이 dist/AlphaServer/ 를 데이터로 임베드하므로
        # 결과 .exe / 폴더 안에 이미 포함되어 있다. 별도로 복사하지 않는다.
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          New-Item -ItemType Directory -Force -Path "dist/win-stage"
          if (Test-Path "dist/AlphaClient") {
            Copy-Item -Recurse "dist/AlphaClient" "dist/win-stage/AlphaClient"
          } elseif (Test-Path "dist/AlphaClient.exe") {
            Copy-Item "dist/AlphaClient.exe" "dist/win-stage/AlphaClient.exe"
          }
          Compress-Archive -Path "dist/win-stage/*" -DestinationPath "dist/Alpha-$version-Windows.zip"
          # 단일 .exe도 시도 (onefile 빌드인 경우 서버까지 임베드된 단일 실행파일)
          if (Test-Path "dist/AlphaClient/AlphaClient.exe") {
            Copy-Item "dist/AlphaClient/AlphaClient.exe" "dist/AlphaClient-$version.exe"
          } elseif (Test-Path "dist/AlphaClient.exe") {
            Copy-Item "dist/AlphaClient.exe" "dist/AlphaClient-$version.exe"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpha-windows
          path: |
            dist/Alpha-*-Windows.zip
            dist/AlphaClient-*.exe

  # ---------- macOS .dmg 빌드 ----------
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.docker.txt
          pip install pyinstaller PySide6

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build .dmg
        run: VERSION=${GITHUB_REF_NAME#v} ./scripts/build_macos_installer.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpha-macos
          path: |
            dist/Alpha-*-macOS.dmg
            dist/Alpha-*-macOS.zip

  # ---------- Release 발행 ----------
  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: alpha-windows
          path: artifacts/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: alpha-macos
          path: artifacts/

      - name: List artifacts
        run: ls -la artifacts/

      - name: Generate changelog
        id: changelog
        run: |
          {
            echo "changelog<<EOF"
            git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null)..HEAD || git log --pretty=format:"- %s (%h)" -n 20
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Alpha ${{ github.ref_name }}
          body: |
            ## Alpha ${{ github.ref_name }}

            ### 다운로드
            - **macOS**: `Alpha-*-macOS.dmg` (또는 `.zip`)
            - **Windows**: `Alpha-*-Windows.zip` 또는 단일 `AlphaClient-*.exe`

            ### Changelog
            ${{ steps.changelog.outputs.changelog }}

            ### 사용 방법
            QUICKSTART_v3.1.md 참조
          draft: false
          prerelease: false
          files: |
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.exe
